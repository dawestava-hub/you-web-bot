<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supprimer Admin - BASEBOT-MD</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:#050b14;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:white;
}

/* CONTAINER STYLE MODERNE */
.container{
  width:420px;
  background:#0a1220;
  border-radius:25px;
  padding:20px;
  border:1px solid #1c2a40;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.title{
  font-size:20px;
  font-weight:700;
  background:linear-gradient(90deg,#00ffa6,#00cfff,#00ffa6);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:glow 3s linear infinite;
}

@keyframes glow{
  0%{background-position:0%}
  100%{background-position:200%}
}

.logo{
  width:90px;
  height:90px;
  object-fit:contain;
}

/* BACK */
.back-link{
  color:#8fa3c1;
  font-size:13px;
  margin-bottom:10px;
  display:inline-block;
  text-decoration:none;
}

/* TITLE */
h1{
  color:#00cfff;
  font-size:18px;
  margin-bottom:15px;
}

/* FORM */
.form-group{
  margin-bottom:15px;
}

label{
  display:block;
  margin-bottom:6px;
  color:#8fa3c1;
  font-size:13px;
}

select, input{
  width:100%;
  padding:12px;
  border-radius:15px;
  border:1px solid #1c2a40;
  background:#050b14;
  color:white;
  outline:none;
  font-size:14px;
}

/* BUTTON */
.btn-delete{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#ff4d4d,#ff1a75);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn-delete:hover{
  transform:translateY(-2px);
  box-shadow:0 5px 15px rgba(255,0,80,0.3);
}

/* MESSAGE */
.message{
  margin-top:15px;
  padding:12px;
  border-radius:15px;
  text-align:center;
  font-size:14px;
  display:none;
}

.success{
  background:#00ffa6;
  color:black;
}

.error{
  background:#ff4d4d;
  color:white;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="title">YOU WEB BOT</div>
    <img src="https://i.postimg.cc/tgN7HVPg/image.png" class="logo">
  </div>

  <a href="/dashboard" class="back-link">← Retour au Dashboard</a>

  <h1>🗑️ Supprimer un Administrateur</h1>

  <div id="message" class="message"></div>

  <form id="deleteForm">
      <div class="form-group">
          <label for="jid">Sélectionnez l'admin:</label>
          <select id="jid" name="jid" required>
              <option value="">Chargement...</option>
          </select>
      </div>
      
      <button type="submit" class="btn-delete">Supprimer Admin</button>
  </form>

</div>

<script>
async function loadAdmins() {
    try {
        const response = await fetch('/api/admins');
        const data = await response.json();
        const select = document.getElementById('jid');
        
        if (data.ok && data.list) {
            select.innerHTML = '<option value="">Sélectionnez un admin</option>';
            data.list.forEach(admin => {
                const option = document.createElement('option');
                option.value = admin;
                option.textContent = admin;
                select.appendChild(option);
            });
        }
    } catch (error) {
        select.innerHTML = '<option value="">Erreur de chargement</option>';
    }
}

document.getElementById('deleteForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const jid = document.getElementById('jid').value;
    if (!jid) {
        alert('Veuillez sélectionner un admin');
        return;
    }
    
    if (!confirm(`Supprimer l'admin ${jid} ?`)) return;
    
    const messageDiv = document.getElementById('message');
    messageDiv.className = 'message';
    messageDiv.textContent = 'Suppression en cours...';
    
    try {
        const response = await fetch('/admin/remove', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ jid })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            messageDiv.className = 'message success';
            messageDiv.innerHTML = '✅ Admin supprimé avec succès!';
            loadAdmins();
        } else {
            messageDiv.className = 'message error';
            messageDiv.textContent = '❌ Erreur: ' + data.error;
        }
    } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = '❌ Erreur: ' + error.message;
    }
});

loadAdmins();
</script>

</body>
</html>
