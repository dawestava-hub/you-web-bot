<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOU WEB BOT DASHBOARD</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:#050b14;
  color:white;
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:#0a1220;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

/* OOLICE TITLE */
.title{
  font-size:22px;
  font-weight:700;
  background:linear-gradient(90deg,#00ffa6,#00cfff,#00ffa6);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:glow 3s linear infinite;
}

@keyframes glow{
  0%{background-position:0%}
  100%{background-position:200%}
}

/* LOGO */
.logo{
  width:80px;
  height:80px;
  object-fit:contain;
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-top:20px;
}

.card{
  background:#0a1220;
  padding:20px;
  border-radius:20px;
  border:1px solid #1c2a40;
  text-align:center;
}

.value{
  font-size:28px;
  font-weight:bold;
  color:#00ffa6;
}

.label{
  font-size:13px;
  color:#8fa3c1;
}

/* MODULES */
.modules{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  margin-top:30px;
}

.module{
  background:#0a1220;
  border-radius:20px;
  padding:20px;
  border:1px solid #1c2a40;
}

.module h2{
  margin-bottom:10px;
  color:#00cfff;
}

/* LINKS */
a{
  display:block;
  padding:10px;
  margin:6px 0;
  background:#050b14;
  border-radius:12px;
  color:#8fa3c1;
  text-decoration:none;
  transition:0.3s;
  border:1px solid #1c2a40;
}

a:hover{
  background:#0f1c33;
  transform:translateX(5px);
  color:#00ffa6;
}

/* STATUS */
.badge{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}

.online{
  background:#00ffa6;
  color:black;
}

.offline{
  background:#ff4d4d;
  color:white;
}

/* CONSOLE */
.console{
  margin-top:20px;
  background:#0a1220;
  border-radius:20px;
  padding:15px;
  font-family:monospace;
  color:#00ffa6;
  height:140px;
  overflow:auto;
  border:1px solid #1c2a40;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">YOU WEB BOT DASHBOARD</div>
  <img src="https://i.postimg.cc/tgN7HVPg/image.png" class="logo">
</div>

<div class="container">

  <!-- STATS -->
  <div class="stats">
    <div class="card">
      <div class="value" id="activeCount">0</div>
      <div class="label">Sessions Actives</div>
    </div>

    <div class="card">
      <div class="value" id="newsletterCount">0</div>
      <div class="label">Newsletters</div>
    </div>

    <div class="card">
      <div class="value" id="adminCount">0</div>
      <div class="label">Admins</div>
    </div>

    <div class="card">
      <div class="value">
        <span class="badge online" id="status">ONLINE</span>
      </div>
      <div class="label">Bot Status</div>
    </div>
  </div>

  <!-- MODULES -->
  <div class="modules">

    <div class="module">
      <h2>📬 Newsletters</h2>
      <a href="/dashboard/newsletters.html">Gérer</a>
      <a href="/dashboard/newsletter-add.html">Ajouter</a>
      <a href="/dashboard/newsletter-remove.html">Supprimer</a>
      <a href="/api/newsletters">API</a>
    </div>

    <div class="module">
      <h2>👑 Admins</h2>
      <a href="/dashboard/admins.html">Gérer</a>
      <a href="/dashboard/admin-add.html">Ajouter</a>
      <a href="/dashboard/admin-remove.html">Supprimer</a>
      <a href="/api/admins">API</a>
    </div>

    <div class="module">
      <h2>📱 Sessions</h2>
      <a href="/dashboard/sessions.html">Liste</a>
      <a href="/dashboard/connect-all.html">Connecter tout</a>
      <a href="/dashboard/active.html">Actives</a>
      <a href="/api/sessions">API</a>
    </div>

    <div class="module">
      <h2>⚡ Actions</h2>
      <a href="/ping">Ping Bot</a>
      <a href="/active">API Active</a>
      <a href="/dashboard/reconnect.html">Reconnect</a>
    </div>

  </div>

  <!-- CONSOLE -->
  <div class="console" id="console">
    🚀 YOU WEB BOT DASHBOARD LOADED...
  </div>

</div>

<script>
async function update(){

  try{

    const a = await fetch("/api/active").then(r=>r.json());
    document.getElementById("activeCount").innerText = a.count || 0;

    const n = await fetch("/api/newsletters").then(r=>r.json());
    document.getElementById("newsletterCount").innerText = n.list?.length || 0;

    const ad = await fetch("/api/admins").then(r=>r.json());
    document.getElementById("adminCount").innerText = ad.list?.length || 0;

    const c = document.getElementById("console");
    const t = new Date().toLocaleTimeString();
    c.innerHTML += `<div>[${t}] update OK</div>`;
    c.scrollTop = c.scrollHeight;

  }catch(e){
    document.getElementById("status").innerText="OFFLINE";
    document.getElementById("status").className="badge offline";
  }
}

update();
setInterval(update,10000);
</script>

</body>
</html>
