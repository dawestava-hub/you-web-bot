<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessions</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:#050b14;
  display:flex;
  justify-content:center;
  padding:20px;
  color:white;
}

/* CONTAINER */
.container{
  width:900px;
  background:#0a1220;
  border-radius:25px;
  padding:20px;
}

/* HEADER (UN SEUL BLOCK) */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

/* TEXTE COLORÉ */
.header h1{
  font-size:20px;
  font-weight:700;
  background:linear-gradient(90deg,#00ffa6,#00cfff,#7a5cff,#00ffa6);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 4s linear infinite;
}

@keyframes shine{
  0%{background-position:0%}
  100%{background-position:300%}
}

/* LOGO */
.logo{
  width:90px;
  height:90px;
  object-fit:contain;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:15px;
}

.card{
  background:#050b14;
  border:1px solid #1c2a40;
  border-radius:15px;
  padding:10px;
  text-align:center;
}

.value{
  font-size:22px;
  font-weight:bold;
  color:#00ffa6;
}

.label{
  font-size:12px;
  color:#8fa3c1;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  padding:12px;
  border-bottom:1px solid #1c2a40;
}

th{
  color:#00cfff;
  text-align:left;
}

.status-badge{
  padding:3px 8px;
  border-radius:12px;
  font-size:12px;
}

.status-active{
  background:#00ffa6;
  color:black;
}

.status-inactive{
  background:#ff4d4d;
  color:white;
}

/* BUTTONS */
.btn-delete{
  background:linear-gradient(90deg,#ff4d4d,#ff1a75);
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

.btn-config{
  color:#00cfff;
  text-decoration:none;
  margin-right:5px;
  font-size:13px;
}

.refresh-btn{
  background:linear-gradient(90deg,#00ffa6,#00cfff);
  border:none;
  padding:10px;
  border-radius:20px;
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER UNIQUE -->
  <div class="header">
    <h1>YOU WEB BOT</h1>
    <img src="https://i.postimg.cc/tgN7HVPg/image.png" class="logo">
  </div>

  <button class="refresh-btn" onclick="loadData()">🔄 Actualiser</button>

  <div class="stats">
    <div class="card">
      <div class="value" id="totalSessions">0</div>
      <div class="label">Total</div>
    </div>
    <div class="card">
      <div class="value" id="activeSessions">0</div>
      <div class="label">Actifs</div>
    </div>
    <div class="card">
      <div class="value" id="inactiveSessions">0</div>
      <div class="label">Inactifs</div>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Numéro</th>
        <th>Statut</th>
        <th>Update</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="sessionsList"></tbody>
  </table>

</div>

<script>
let activeSet = new Set();

async function loadActiveSessions(){
  const r = await fetch('/api/active');
  const d = await r.json();

  activeSet = new Set(d.active || []);
  document.getElementById("activeSessions").innerText = d.count || 0;
}

async function loadSessions(){
  const r = await fetch('/api/sessions');
  const d = await r.json();

  const tbody = document.getElementById("sessionsList");
  tbody.innerHTML = "";

  document.getElementById("totalSessions").innerText = d.sessions.length;

  let inactive = 0;

  d.sessions.forEach(s=>{
    const isActive = activeSet.has(s.number);
    if(!isActive) inactive++;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${s.number}</td>
      <td>
        <span class="status-badge ${isActive?'status-active':'status-inactive'}">
          ${isActive?'ACTIVE':'INACTIVE'}
        </span>
      </td>
      <td>${s.updatedAt ? new Date(s.updatedAt).toLocaleString() : 'N/A'}</td>
      <td>
        <a class="btn-config" href="/dashboard/session-config.html?number=${s.number}">⚙️</a>
        <a class="btn-config" href="/dashboard/session-about.html?number=${s.number}">ℹ️</a>
        <button class="btn-delete" onclick="deleteSession('${s.number}')">🗑️</button>
      </td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById("inactiveSessions").innerText = inactive;
}

async function deleteSession(number){
  if(!confirm("Supprimer " + number + " ?")) return;

  await fetch('/api/session/delete',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({number})
  });

  loadData();
}

async function loadData(){
  await loadActiveSessions();
  await loadSessions();
}

loadData();
setInterval(loadActiveSessions,5000);
</script>

</body>
</html>
