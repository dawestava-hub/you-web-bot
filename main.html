<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOU MINI BOT</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#050b14;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.music-btn{
position:fixed;
top:15px;
right:15px;
width:42px;
height:42px;
border-radius:12px;
background:#0a1220;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border:1px solid #1c2a40;
}

.music-btn i{color:#00ffa6;}

.container{
width:340px;
background:#0a1220;
border-radius:25px;
padding:18px;
}

.profile{
width:110px;
height:110px;
border-radius:20px;
margin:auto;
background:url('https://i.postimg.cc/tgN7HVPg/image.png') center/cover;
}

.title{
text-align:center;
font-size:24px;
margin-top:10px;
font-weight:700;
}

.title span{color:#00ffa6;}

.subtitle{
text-align:center;
font-size:11px;
opacity:0.7;
margin-bottom:15px;
}

.card{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
margin-bottom:12px;
border-radius:18px;
background:#111a2a;
cursor:pointer;
transition:0.2s;
}

.card:hover{
background:#15233a;
}

.card-left{
display:flex;
align-items:center;
gap:12px;
}

.icon{
width:42px;
height:42px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
background:#0f1a2b;
}

.bottom{
display:flex;
justify-content:space-between;
margin-top:20px;
gap:10px;
}

.small-card{
flex:1;
padding:12px;
border-radius:18px;
background:#111a2a;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.small-card:hover{
background:#15233a;
}
</style>
</head>

<body>

<div class="music-btn" onclick="toggleMusic()">
<i class="fa-solid fa-music"></i>
</div>

<div class="container">

<div class="profile"></div>

<div class="title">YOU MINI <span>BOT</span></div>
<div class="subtitle">PLATEFORME PREMIUM</div>

<!-- 🔑 PAIR -->
<div class="card" onclick="goTo('pair')">
<div class="card-left">
<div class="icon"><i class="fa-solid fa-key"></i></div>
PAIR CODE
</div>
</div>

<!-- 📸 QR -->
<div class="card" onclick="goTo('qr')">
<div class="card-left">
<div class="icon"><i class="fa-solid fa-qrcode"></i></div>
QR CODE
</div>
</div>

<!-- 🔗 BOTTOM LINKS -->
<div class="bottom">

<div class="small-card" onclick="openLink('ig')">
<i class="fa-brands fa-instagram"></i>
<div>INSTAGRAM</div>
</div>

<div class="small-card" onclick="openLink('wa')">
<i class="fa-brands fa-whatsapp"></i>
<div>CHANNEL</div>
</div>

<div class="small-card" onclick="openLink('gr')">
<i class="fa-solid fa-users"></i>
<div>GROUP</div>
</div>

</div>

</div>

<script>

let music = new Audio("https://files.catbox.moe/fk4hdm.mp3");
music.loop = true;
music.volume = 0.5;

function toggleMusic(){
music.paused ? music.play() : music.pause();
}

const sounds = {
pair: "https://files.catbox.moe/l5ea0h.mp3",
qr: "https://files.catbox.moe/5zrtrx.mp3",
ig: "https://files.catbox.moe/l5ea0h.mp3",
wa: "https://files.catbox.moe/nsh24s.mp3",
gr: "https://files.catbox.moe/xgdtf4.mp3"
};

function playSound(type){
new Audio(sounds[type]).play();
}

/* 🚀 REDIRECTION INTERNE */
function goTo(type){

  const audio = new Audio(sounds[type]);
  audio.play();

  setTimeout(() => {
    if(type === "pair"){
      window.location.href = "/pair";
    }
    if(type === "qr"){
      window.location.href = "/qr-page";
    }
  }, 400);
}

/* 🌍 OUVERTURE LIENS EXTERNES */
function openLink(type){

  const audio = new Audio(sounds[type]);
  audio.play();

  setTimeout(() => {

    if(type === "ig"){
      window.open("https://www.instagram.com/siddharths.khoana?igsh=enZyZmhrZmt2ZnVh", "_blank");
    }

    if(type === "wa"){
      window.open("https://whatsapp.com/channel/0029VbCzeHxDeON8UEum3t3d", "_blank");
    }

    if(type === "gr"){
      window.open("https://chat.whatsapp.com/LkUGJWQySXYBLqY7FAf3ed?mode=gi_t", "_blank");
    }

  }, 400);
}

</script>

</body>
</html>
