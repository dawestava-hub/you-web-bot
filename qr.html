<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR CODE - YOU MINI BOT</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Outfit',sans-serif;
}

body{
  background:#050b14;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

/* CONTAINER */
.container{
  width:340px;
  background:#0a1220;
  border-radius:25px;
  padding:18px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.header h1{
  font-size:18px;
  font-weight:600;
}

/* 🔥 LOGO PLUS GROS */
.logo{
  width:95px;
  height:95px;
  border-radius:16px;
  background:url('https://i.postimg.cc/tgN7HVPg/image.png') center/cover;
}

/* LABEL */
.label{
  font-size:12px;
  color:#8fa3c1;
  margin-bottom:5px;
}

/* QR BOX */
.qr-box{
  border:1px solid #1c2a40;
  border-radius:20px;
  padding:18px;
  text-align:center;
  margin-top:10px;
  background:#050b14;
}

.qr-box img{
  width:170px;
  border-radius:10px;
}

/* SUCCESS */
.success{
  text-align:center;
  font-size:12px;
  color:#00ffa6;
  margin-top:10px;
}

/* STEPS */
.steps{
  font-size:11px;
  color:#8fa3c1;
  margin-top:15px;
  line-height:1.5;
}

/* BUTTONS */
.actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.btn{
  flex:1;
  padding:11px;
  border:none;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  font-size:13px;
}

.back{
  background:#1c2a40;
  color:white;
}

.refresh{
  background:linear-gradient(90deg,#00ffa6,#00cfff);
  color:black;
}

/* FOOTER */
.footer{
  margin-top:15px;
  font-size:11px;
  color:#6c7a92;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>QR Pairing</h1>
    <div class="logo"></div>
  </div>

  <div class="label">DEVICE CONNECTION</div>

  <div class="qr-box">
    <img id="qrImage" src="/qr">
  </div>

  <div class="success">✔ Code QR généré - scannez maintenant</div>

  <div class="steps">
    1. Ouvrez WhatsApp<br>
    2. Appareils liés<br>
    3. Scanner le code QR
  </div>

  <div class="actions">
    <button class="btn back" onclick="window.location.href='/'">⬅ Retour</button>
    <button class="btn refresh" onclick="refreshQR()">🔄 Refresh</button>
  </div>

  <div class="footer">
    Secure pairing system • YOU MINI BOT
  </div>

</div>

<script>
function refreshQR(){
  const qr = document.getElementById("qrImage");
  qr.src = "/qr?rand=" + Math.random();
}
setInterval(refreshQR, 10000);
</script>

</body>
</html>
